<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ff7a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DutchTrainer">
    <title>DutchTrainer</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Dutch from English</p>
          <h1>DutchTrainer</h1>
          <p id="contentModeBadge" class="mode-badge">Live content</p>
        </div>
        <div class="header-actions">
          <button id="soundToggle" class="icon-button" type="button" aria-label="Mute sounds">♪</button>
          <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle dark mode">◐</button>
        </div>
      </header>

      <main>
        <section class="panel profile-panel">
          <div class="section-title">
            <h2>Profile</h2>
            <span>Local only</span>
          </div>
          <label class="profile-name">
            <span>Learner name</span>
            <input id="learnerNameInput" autocomplete="name" placeholder="Your name">
          </label>
          <div class="stats-grid" aria-label="Learning stats">
            <article class="stat-card">
              <span id="xpValue">0</span>
              <small>XP</small>
            </article>
            <article class="stat-card">
              <span id="streakValue">0</span>
              <small>Streak</small>
            </article>
            <article class="stat-card">
              <span id="dueValue">0</span>
              <small>Due</small>
            </article>
          </div>
          <div class="profile-grid">
            <article>
              <strong id="profileStreak">0</strong>
              <span>Current streak</span>
            </article>
            <article>
              <strong id="profileXp">0</strong>
              <span>XP</span>
            </article>
            <article>
              <strong id="profileWords">0</strong>
              <span>Words learned</span>
            </article>
            <article>
              <strong id="profileDue">0</strong>
              <span>Due today</span>
            </article>
          </div>
        </section>

        <section class="panel practice-panel">
          <div class="section-title">
            <h2 id="practiceTitle">Practice</h2>
            <span id="practiceMeta">Choose a topic</span>
          </div>

          <div id="exerciseArea" class="exercise-area"></div>
        </section>

        <section class="panel vocab-panel">
          <div class="section-title">
            <h2>Vocabulary</h2>
            <span id="vocabCount">Words</span>
          </div>
          <div id="vocabPractice" class="vocab-practice"></div>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>Topics</h2>
            <span id="topicCount">Loading</span>
          </div>
          <div id="topicList" class="topic-list"></div>
        </section>

        <section class="panel path-panel">
          <div class="section-title">
            <h2>Lesson Path</h2>
            <span id="pathCount">Preview path</span>
          </div>
          <div id="lessonPath" class="lesson-path"></div>
        </section>
      </main>
    </div>

    <script src="app.js?v=20" type="module"></script>
  </body>
</html>
