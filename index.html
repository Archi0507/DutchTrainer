<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DutchTrainer">
    <title>DutchTrainer</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">A0/A1 Dutch</p>
          <h1>DutchTrainer</h1>
        </div>
        <div class="header-actions">
          <button id="soundToggle" class="icon-button" type="button" aria-label="Mute sounds">♪</button>
          <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle dark mode">◐</button>
        </div>
      </header>

      <main>
        <section class="stats-grid" aria-label="Learning stats">
          <article class="stat-card">
            <span id="xpValue">0</span>
            <small>XP</small>
          </article>
          <article class="stat-card">
            <span id="streakValue">0</span>
            <small>Streak</small>
          </article>
          <article class="stat-card">
            <span id="dueValue">0</span>
            <small>Due</small>
          </article>
        </section>

        <section class="panel">
          <div class="section-title">
            <h2>Topic</h2>
            <span id="topicCount">Loading</span>
          </div>
          <div id="topicList" class="topic-list"></div>
        </section>

        <section class="panel practice-panel">
          <div class="section-title">
            <h2 id="practiceTitle">Practice</h2>
            <span id="practiceMeta">Choose a topic</span>
          </div>

          <div id="exerciseArea" class="exercise-area"></div>
        </section>
      </main>
    </div>

    <script src="app.js?v=10" type="module"></script>
  </body>
</html>
